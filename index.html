<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Babun ❤️</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:90%;
    max-width:600px;
    padding:30px;
    border:4px solid gold;
    border-radius:20px;
    box-shadow:0 0 20px gold;
    text-align:center;
}

h1{
    color:gold;
    font-size:40px;
}

#message{
    margin-top:20px;
    font-size:22px;
    line-height:1.8;
}
</style>
</head>

<body>

<div class="box">
<h1>🎂 Happy Birthday Babun 🎂</h1>

<div id="message"></div>

</div>

<script>

let text=`Happy Birthday Babun 💗

I may not be a part of your life anymore,
but you'll always be someone I'll quietly wish the best for.

I hope today brings you happiness,
success and countless reasons to smile.

Take care of yourself...
and stay happy always. ❤️`;

let i=0;

function typeWriter(){
    if(i<text.length){
        document.getElementById("message").innerHTML+=text.charAt(i);
        i++;
        setTimeout(typeWriter,40);
    }
}

typeWriter();

</script>

</body>
</html>
