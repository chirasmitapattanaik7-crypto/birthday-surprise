<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Babun ❤️</title>

<style>
body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:90%;
    max-width:700px;
    border:4px solid gold;
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 25px gold;
    text-align:center;
}

h1{
    color:gold;
    font-size:40px;
}

#message{
    margin-top:25px;
    font-size:24px;
    line-height:1.8;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="box">
<h1>🎂 Happy Birthday Abinash Sahu 🎂</h1>

<div id="message"></div>
</div>

<script>

const text=`Happy Birthday Babun 💗

I may not be a part of your life anymore,
but you'll always be someone I'll quietly wish the best for.

I hope today brings you happiness,
peace,
and countless reasons to smile.

May every dream you carry find its way to you.

Take care of yourself,
keep shining,
and always stay happy.

Once again...

Happy Birthday ❤️`;

let i=0;

function typing(){
    if(i<text.length){
        document.getElementById("message").innerHTML+=text.charAt(i);
        i++;
        setTimeout(typing,40);
    }
}

typing();

</script>

</body>
</html>
